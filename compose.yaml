services:
  message-hub:
    build: src/skills/core/message-hub
    # Security hardening (add more as we go)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CONTROL_ADDR=host.docker.internal:50023

  llm-caller:
    build: src/skills/core/llm-caller
    depends_on:
      - message-hub
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    restart: unless-stopped
    environment:
      - CONTROL_ADDR=message-hub:50024

  ollama:
    build: src/skills/core/ollama
    depends_on:
      - message-hub
    volumes:
      - ./shared/ollama:/home/ubuntu/.ollama:rw
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      - CONTROL_ADDR=message-hub:50024

  coder:
    build: src/skills/core/coder
    depends_on:
      - message-hub
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    restart: unless-stopped
    environment:
      - CONTROL_ADDR=message-hub:50024
