services:
  message-hub:
    build: src/skills/core/message-hub
    volumes:
      - ./shared/sockets/control:/run/sockets/control:rw
    # Security hardening (add more as we go)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    restart: unless-stopped
